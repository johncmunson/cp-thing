name: Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_TELEMETRY_DISABLED: "1"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

jobs:
  verify-main:
    name: Verify Main Head
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.current.outputs.should_deploy }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}

      - name: Confirm workflow commit is still main
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash scripts/ci/verify-main-head.sh

  deploy-production:
    name: Deploy Production
    needs: verify-main
    if: ${{ needs.verify-main.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup-node-pnpm

      - name: Pull Vercel production environment
        run: pnpm exec vercel pull --yes --environment=production --scope "$VERCEL_ORG_ID"

      - name: Build Vercel production artifacts
        run: pnpm exec vercel build --prod --yes

      - name: Run production database migrations
        run: pnpm exec vercel env run --environment=production --scope "$VERCEL_ORG_ID" -- pnpm db:migrate

      - name: Create unaliased production deployment
        id: deploy
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash scripts/ci/deploy-vercel-production.sh

      - name: Wait for Vercel production deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail

          pnpm exec vercel inspect "$DEPLOYMENT_URL" --wait --timeout 10m --logs --scope "$VERCEL_ORG_ID"

      - name: Smoke check production deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: bash scripts/ci/smoke-check.sh

      - name: Promote production deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: bash scripts/ci/promote-vercel-production.sh
