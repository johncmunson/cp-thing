name: Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10.28.0
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_TELEMETRY_DISABLED: "1"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

jobs:
  deploy-production:
    name: Deploy Production
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Pull Vercel production environment
        run: pnpm exec vercel pull --yes --environment=production

      - name: Build Vercel production artifacts
        run: pnpm exec vercel build --prod --yes

      - name: Run production database migrations
        run: pnpm exec vercel env run --environment=production -- pnpm db:migrate

      - name: Deploy Vercel production
        id: deploy
        run: |
          set -euo pipefail

          deployment_output="$(pnpm exec vercel deploy --prebuilt --prod --yes)"
          deployment_url="$(printf '%s\n' "$deployment_output" | grep -Eo 'https://[^[:space:]]+' | tail -n1 || true)"

          if [ -z "$deployment_url" ]; then
            printf '%s\n' "$deployment_output"
            echo "Unable to determine deployment URL." >&2
            exit 1
          fi

          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Production deployment"
            echo "- URL: $deployment_url"
            echo "- Commit: ${{ github.event.workflow_run.head_sha || github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke check production deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: bash scripts/ci/smoke-check.sh
