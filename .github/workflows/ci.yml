name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_TELEMETRY_DISABLED: "1"

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Detect CI file changes
        id: ci_files
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci:
              - ".github/**"
              - "scripts/ci/**"

      - name: Download actionlint
        if: steps.ci_files.outputs.ci == 'true'
        id: get_actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
        shell: bash

      - name: Actionlint
        if: steps.ci_files.outputs.ci == 'true'
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

      - name: ShellCheck
        if: steps.ci_files.outputs.ci == 'true'
        run: shellcheck scripts/ci/*.sh

      - uses: ./.github/actions/setup-node-pnpm

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test
