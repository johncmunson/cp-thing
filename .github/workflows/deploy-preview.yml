name: Deploy Preview

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches-ignore: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: deploy-preview-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_TELEMETRY_DISABLED: "1"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID || secrets.NEON_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy Preview
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_branch != 'main' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Identify preview source
        id: source
        env:
          PR_HEAD_BRANCH: ${{ github.event.workflow_run.pull_requests[0].head.ref }}
          PR_HEAD_SHA: ${{ github.event.workflow_run.pull_requests[0].head.sha }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          git_branch="${PR_HEAD_BRANCH:-$WORKFLOW_HEAD_BRANCH}"
          head_sha="${PR_HEAD_SHA:-$WORKFLOW_HEAD_SHA}"

          if [ -z "$git_branch" ] || [ -z "$head_sha" ]; then
            echo "Unable to determine PR head branch/SHA from CI workflow_run payload." >&2
            exit 1
          fi

          echo "git_branch=$git_branch" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Verify pull request is still open and current
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_BRANCH: ${{ steps.source.outputs.git_branch }}
          HEAD_SHA: ${{ steps.source.outputs.head_sha }}
          EVENT_PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail

          pr_number=""

          write_outputs() {
            {
              echo "number=${pr_number:-}"
              echo "should_deploy=$1"
            } >> "$GITHUB_OUTPUT"
          }

          skip_preview() {
            local reason="$1"
            write_outputs false
            echo "::notice::$reason"
            {
              echo "### Preview deployment skipped"
              echo "- Reason: $reason"
              echo "- Git branch: $GIT_BRANCH"
              echo "- Workflow SHA: $HEAD_SHA"
              if [ -n "${pr_number:-}" ]; then
                echo "- Pull request: #$pr_number"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          }

          if [ -n "$EVENT_PR_NUMBER" ]; then
            pr_json="$(gh pr view "$EVENT_PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json number,state,headRefName,headRefOid,isCrossRepository)"
          else
            pr_json="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$GIT_BRANCH" --state open --json number,state,headRefName,headRefOid,isCrossRepository --jq '.[0] // empty')"
          fi

          if [ -z "$pr_json" ] || [ "$pr_json" = "null" ]; then
            skip_preview "No open pull request was found for $GIT_BRANCH."
            exit 0
          fi

          pr_number="$(printf '%s\n' "$pr_json" | jq -r '.number // empty')"
          pr_state="$(printf '%s\n' "$pr_json" | jq -r '.state // empty')"
          pr_head_ref="$(printf '%s\n' "$pr_json" | jq -r '.headRefName // empty')"
          pr_head_sha="$(printf '%s\n' "$pr_json" | jq -r '.headRefOid // empty')"
          is_cross_repo="$(printf '%s\n' "$pr_json" | jq -r '.isCrossRepository // false')"

          if [ "$pr_state" != "OPEN" ]; then
            skip_preview "Pull request #$pr_number is no longer open."
            exit 0
          fi

          if [ "$is_cross_repo" = "true" ]; then
            skip_preview "Pull request #$pr_number is from a fork."
            exit 0
          fi

          if [ "$pr_head_ref" != "$GIT_BRANCH" ]; then
            skip_preview "Pull request #$pr_number now points at $pr_head_ref, not $GIT_BRANCH."
            exit 0
          fi

          if [ "$pr_head_sha" != "$HEAD_SHA" ]; then
            skip_preview "Pull request #$pr_number moved from $HEAD_SHA to $pr_head_sha."
            exit 0
          fi

          write_outputs true
          echo "Pull request #$pr_number is open and still points at $HEAD_SHA."

      - uses: actions/checkout@v4
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        with:
          ref: ${{ steps.source.outputs.head_sha }}

      - uses: ./.github/actions/setup-node-pnpm
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}

      - name: Compute preview names
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        id: preview
        env:
          GIT_BRANCH: ${{ steps.source.outputs.git_branch }}
          HEAD_SHA: ${{ steps.source.outputs.head_sha }}
        run: bash scripts/ci/preview-names.sh "$GIT_BRANCH" "$HEAD_SHA"

      - name: Create or reuse Neon preview branch
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: ${{ steps.preview.outputs.neon_branch }}
          database: ${{ vars.NEON_DATABASE_NAME || 'neondb' }}
          username: ${{ vars.NEON_DATABASE_USERNAME || 'neondb_owner' }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Mask preview database URLs
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.create_neon_branch.outputs.db_url }}
        run: |
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$DATABASE_URL_UNPOOLED"

      - name: Pull Vercel preview environment
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        env:
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
        run: pnpm exec vercel pull --yes --environment=preview --git-branch="$GIT_BRANCH"

      - name: Run preview database migrations
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        env:
          VERCEL_ENV: preview
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.create_neon_branch.outputs.db_url }}
        run: pnpm db:migrate

      - name: Build Vercel preview artifacts
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.create_neon_branch.outputs.db_url }}
        run: pnpm exec vercel build --target=preview --yes

      - name: Deploy Vercel preview
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        id: deploy
        env:
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
          HEAD_SHA: ${{ steps.preview.outputs.head_sha }}
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.create_neon_branch.outputs.db_url }}
        run: |
          set -euo pipefail

          if ! deployment_output="$(pnpm exec vercel deploy \
            --prebuilt \
            --target=preview \
            --yes \
            --format=json \
            --env DATABASE_URL="$DATABASE_URL" \
            --env DATABASE_URL_UNPOOLED="$DATABASE_URL_UNPOOLED" \
            --meta githubCommitSha="$HEAD_SHA" \
            --meta githubCommitRef="$GIT_BRANCH")"; then
            printf '%s\n' "$deployment_output"
            exit 1
          fi

          if ! deployment_url="$(printf '%s\n' "$deployment_output" | jq -r '.url // .deployment.url // empty')"; then
            printf '%s\n' "$deployment_output"
            echo "Unable to parse deployment JSON output." >&2
            exit 1
          fi

          if [ -z "$deployment_url" ]; then
            printf '%s\n' "$deployment_output"
            echo "Unable to determine deployment URL." >&2
            exit 1
          fi

          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Preview deployment"
            echo "- URL: $deployment_url"
            echo "- Git branch: $GIT_BRANCH"
            echo "- Neon branch: ${{ steps.preview.outputs.neon_branch }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke check preview deployment
        if: ${{ steps.pr.outputs.should_deploy == 'true' }}
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: bash scripts/ci/smoke-check.sh

      - name: Comment preview details on PR
        if: ${{ steps.pr.outputs.should_deploy == 'true' && steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
          NEON_BRANCH: ${{ steps.preview.outputs.neon_branch }}
          NEON_PROJECT_ID: ${{ env.NEON_PROJECT_ID }}
        with:
          script: |
            const marker = '<!-- cp-thing-preview-deployment -->';
            const body = `${marker}\n## Preview deployment\n\n- **Vercel**: ${process.env.PREVIEW_URL}\n- **Git branch**: \`${process.env.GIT_BRANCH}\`\n- **Neon branch**: \`${process.env.NEON_BRANCH}\`\n- **Neon project**: https://console.neon.tech/app/projects/${process.env.NEON_PROJECT_ID}`;
            const issue_number = Number(process.env.PR_NUMBER);
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
