name: Deploy Preview

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: deploy-preview-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10.28.0
  VERCEL_CLI_VERSION: 54.10.3
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID || secrets.NEON_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy Preview
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && (github.head_ref || github.ref_name) != 'main' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compute preview names
        id: preview
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          branch_slug="$(printf '%s' "$GIT_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' | cut -c1-48)"
          if [ -z "$branch_slug" ]; then
            branch_slug="branch"
          fi

          branch_hash="$(printf '%s' "$GIT_BRANCH" | sha1sum | cut -c1-8)"
          neon_branch="preview/${branch_slug}-${branch_hash}"
          sha_short="${HEAD_SHA:0:7}"

          echo "git_branch=$GIT_BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "sha_short=$sha_short" >> "$GITHUB_OUTPUT"
          echo "neon_branch=$neon_branch" >> "$GITHUB_OUTPUT"

      - name: Create or reuse Neon preview branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: ${{ steps.preview.outputs.neon_branch }}
          database: ${{ vars.NEON_DATABASE_NAME || 'neondb' }}
          role: ${{ vars.NEON_DATABASE_ROLE || 'neondb_owner' }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Mask preview database URLs
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.create_neon_branch.outputs.db_url }}
        run: |
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$DATABASE_URL_UNPOOLED"

      - name: Upsert Vercel branch-specific database env vars
        env:
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.create_neon_branch.outputs.db_url }}
        run: |
          set -euo pipefail

          printf '%s' "$DATABASE_URL" \
            | pnpm dlx vercel@${VERCEL_CLI_VERSION} env add DATABASE_URL preview "$GIT_BRANCH" --force --yes

          printf '%s' "$DATABASE_URL_UNPOOLED" \
            | pnpm dlx vercel@${VERCEL_CLI_VERSION} env add DATABASE_URL_UNPOOLED preview "$GIT_BRANCH" --force --yes

      - name: Pull Vercel preview environment
        env:
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
        run: pnpm dlx vercel@${VERCEL_CLI_VERSION} pull --yes --environment=preview --git-branch="$GIT_BRANCH"

      - name: Run preview database migrations
        env:
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
        run: pnpm dlx vercel@${VERCEL_CLI_VERSION} env run --environment=preview --git-branch="$GIT_BRANCH" -- pnpm db:migrate

      - name: Build Vercel preview artifacts
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.create_neon_branch.outputs.db_url }}
        run: pnpm dlx vercel@${VERCEL_CLI_VERSION} build --target=preview --yes

      - name: Deploy Vercel preview
        id: deploy
        env:
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
          HEAD_SHA: ${{ steps.preview.outputs.head_sha }}
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url_with_pooler }}
          DATABASE_URL_UNPOOLED: ${{ steps.create_neon_branch.outputs.db_url }}
        run: |
          set -euo pipefail

          deployment_url="$(pnpm dlx vercel@${VERCEL_CLI_VERSION} deploy \
            --prebuilt \
            --target=preview \
            --yes \
            --env DATABASE_URL="$DATABASE_URL" \
            --env DATABASE_URL_UNPOOLED="$DATABASE_URL_UNPOOLED" \
            --meta githubCommitSha="$HEAD_SHA" \
            --meta githubCommitRef="$GIT_BRANCH")"

          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Preview deployment"
            echo "- URL: $deployment_url"
            echo "- Git branch: $GIT_BRANCH"
            echo "- Neon branch: ${{ steps.preview.outputs.neon_branch }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Find open pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ -n "$EVENT_PR_NUMBER" ]; then
            pr_number="$EVENT_PR_NUMBER"
          else
            pr_number="$(gh pr list --head "$GIT_BRANCH" --state open --json number --jq '.[0].number // empty')"
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Comment preview details on PR
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
          NEON_BRANCH: ${{ steps.preview.outputs.neon_branch }}
          NEON_PROJECT_ID: ${{ env.NEON_PROJECT_ID }}
        with:
          script: |
            const marker = '<!-- cp-thing-preview-deployment -->';
            const body = `${marker}\n## Preview deployment\n\n- **Vercel**: ${process.env.PREVIEW_URL}\n- **Git branch**: \`${process.env.GIT_BRANCH}\`\n- **Neon branch**: \`${process.env.NEON_BRANCH}\`\n- **Neon project**: https://console.neon.tech/app/projects/${process.env.NEON_PROJECT_ID}`;
            const issue_number = Number(process.env.PR_NUMBER);
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
