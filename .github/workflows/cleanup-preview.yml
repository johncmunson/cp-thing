name: Cleanup Preview

on:
  delete:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      git_branch:
        description: Git branch name whose preview resources should be removed
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cleanup-preview-${{ github.event.ref || github.event.pull_request.head.ref || inputs.git_branch }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10.28.0
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_TELEMETRY_DISABLED: "1"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID || secrets.NEON_PROJECT_ID }}

jobs:
  cleanup-preview:
    name: Cleanup Preview
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref != 'main') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compute preview names
        id: preview
        env:
          DELETE_REF: ${{ github.event.ref }}
          DELETE_REF_TYPE: ${{ github.event.ref_type }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          DISPATCH_REF: ${{ inputs.git_branch }}
        run: |
          set -euo pipefail

          case "$GITHUB_EVENT_NAME" in
            delete)
              if [ "$DELETE_REF_TYPE" != "branch" ]; then
                echo "Not a branch delete event; skipping."
                exit 0
              fi
              git_branch="$DELETE_REF"
              ;;
            pull_request)
              git_branch="$PR_HEAD_REF"
              ;;
            workflow_dispatch)
              git_branch="$DISPATCH_REF"
              ;;
            *)
              echo "Unsupported event: $GITHUB_EVENT_NAME" >&2
              exit 1
              ;;
          esac

          branch_slug="$(printf '%s' "$git_branch" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' | cut -c1-48)"
          if [ -z "$branch_slug" ]; then
            branch_slug="branch"
          fi

          branch_hash="$(printf '%s' "$git_branch" | sha1sum | cut -c1-8)"
          neon_branch="preview/${branch_slug}-${branch_hash}"

          echo "git_branch=$git_branch" >> "$GITHUB_OUTPUT"
          echo "neon_branch=$neon_branch" >> "$GITHUB_OUTPUT"

      - name: Remove Vercel preview deployments
        id: vercel_deployments
        env:
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
        run: |
          set -euo pipefail

          deployment_ids_file="$(mktemp)"
          next_args=()

          while :; do
            response="$(pnpm exec vercel list \
              --yes \
              --environment=preview \
              --meta "githubCommitRef=$GIT_BRANCH" \
              --format=json \
              "${next_args[@]}")"

            printf '%s\n' "$response" | jq -r '.deployments[]?.id' >> "$deployment_ids_file"

            next_page="$(printf '%s\n' "$response" | jq -r '.pagination.next // empty')"
            if [ -z "$next_page" ]; then
              break
            fi

            next_args=(--next "$next_page")
          done

          sort -u "$deployment_ids_file" -o "$deployment_ids_file"
          deployment_count="$(wc -l < "$deployment_ids_file" | tr -d ' ')"

          if [ "$deployment_count" = "0" ]; then
            echo "No Vercel preview deployments found for branch $GIT_BRANCH."
            echo "removed_count=0" >> "$GITHUB_OUTPUT"
            echo "failed_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          failed_count=0
          while IFS= read -r deployment_id; do
            if [ -z "$deployment_id" ]; then
              continue
            fi

            echo "Removing Vercel preview deployment $deployment_id"
            if ! pnpm exec vercel remove "$deployment_id" --yes; then
              echo "::warning::Failed to remove Vercel preview deployment $deployment_id"
              failed_count=$((failed_count + 1))
            fi
          done < "$deployment_ids_file"

          removed_count=$((deployment_count - failed_count))
          echo "removed_count=$removed_count" >> "$GITHUB_OUTPUT"
          echo "failed_count=$failed_count" >> "$GITHUB_OUTPUT"

      - name: Remove Vercel branch-specific database env vars
        env:
          GIT_BRANCH: ${{ steps.preview.outputs.git_branch }}
        run: |
          set -euo pipefail

          pnpm exec vercel env rm DATABASE_URL preview "$GIT_BRANCH" --yes || true
          pnpm exec vercel env rm DATABASE_URL_UNPOOLED preview "$GIT_BRANCH" --yes || true

      - name: Delete Neon preview branch
        uses: neondatabase/delete-branch-action@v3
        continue-on-error: true
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: ${{ steps.preview.outputs.neon_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Write cleanup summary
        run: |
          {
            echo "### Preview cleanup"
            echo "- Git branch: ${{ steps.preview.outputs.git_branch }}"
            echo "- Vercel preview deployments removed: ${{ steps.vercel_deployments.outputs.removed_count }}"
            echo "- Vercel preview deployment removal failures: ${{ steps.vercel_deployments.outputs.failed_count }}"
            echo "- Neon branch: ${{ steps.preview.outputs.neon_branch }}"
          } >> "$GITHUB_STEP_SUMMARY"
